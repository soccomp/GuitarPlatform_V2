name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Python Backend ─────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip check

      - name: Python syntax check
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/routers/courses.py
          python -m py_compile backend/routers/songs.py
          python -m py_compile backend/routers/videos.py

      - name: Import check
        run: |
          cd backend
          python -c "from routers import courses, songs, videos; print('✅ imports OK')"

      - name: Backend unit tests
        run: python -m unittest discover -s backend/tests -v

  # ─── Vue Frontend ───────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --prefix frontend

      - name: Vue build check
        run: npm run build --prefix frontend 2>&1 | tail -5

      - name: ESLint check
        run: npm run lint --prefix frontend 2>&1 | tail -10 || true
